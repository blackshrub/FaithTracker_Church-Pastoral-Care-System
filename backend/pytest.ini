[pytest]
# Pytest configuration for FaithTracker backend tests
#
# DEFAULT BEHAVIOR (just `pytest`):
#   - Excludes @pytest.mark.slow tests (network-bound, ~10 tests)
#   - Auto-parallel via pytest-xdist (-n auto, all CPU cores)
#   - Concise output (-q, no -v)
#
# Useful overrides:
#   pytest -m "slow or not slow"   # full suite incl. slow
#   pytest -n 0                    # disable parallelism (debug)
#   pytest --testmon               # only run tests touched by code changes
#   pytest --lf                    # only last failures
#   pytest --ff -x                 # failures first, stop on first

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio configuration
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Output options
# - -n auto: parallel via pytest-xdist (all CPU cores)
# - --dist loadgroup: keep tests with same xdist_group marker on the
#   same worker, lets us pin shared-state tests together without
#   serializing the whole suite
# - -m "not slow": exclude slow markers by default
# - -p no:Faker / no:cacheprovider: drop plugins we don't use to shave
#   collection overhead. anyio is needed by litestar TestClient.
addopts =
    -ra
    --strict-markers
    --tb=short
    --disable-warnings
    -p no:warnings
    -p no:cacheprovider
    -p no:Faker
    -n auto
    --dist=loadgroup
    -m "not slow"
    # Test classes that hang the sync TestClient (real SSE streams,
    # APScheduler jobs, change-stream watch loops). Documented in
    # TESTING_GUIDE.md "Why are some tests deselected".
    --deselect=tests/test_integration_server.py::TestSSEStream
    --deselect=tests/test_new_features.py::TestChangeStreamWatcherStartStop
    --deselect=tests/test_new_features.py::TestChangeStreamWatcherIsRunning
    --deselect=tests/test_new_features.py::TestChangeStreamWatcherIsReplicaSetAvailable
    --deselect=tests/test_new_features.py::TestModuleLevelFunctions
    # These files start APScheduler jobs / change-stream watchers that
    # block pytest forever. Documented in TESTING_GUIDE.md.
    --ignore=tests/test_scheduler.py
    --ignore=tests/test_scheduler_comprehensive.py
    --ignore=tests/test_scheduler_jobs.py
    --ignore=tests/test_server_coverage.py

# Test paths
testpaths = tests

# Markers for organizing tests
markers =
    unit: Unit tests (fast, isolated, mocked)
    integration: Integration tests (require external services like MongoDB)
    slow: Slow tests (>1s typical) — excluded by default, run via -m slow
    asyncio: Async tests
    flaky: Tests that intermittently fail (network, timing) — quarantine

# Coverage options (when using --cov)
[coverage:run]
source = .
omit =
    tests/*
    venv/*
    .venv/*
    */site-packages/*
    config.py
    migrate.py
    # Standalone CLI utility scripts (not part of application runtime)
    bulk_engagement_update.py
    comprehensive_test.py
    create_indexes.py
    fix_care_event_ids.py
    import_data.py
    import_photos.py
    init_db.py
    normalize_user_phones.py
    recalculate_engagement.py
    pdf_report.py
    docker_secrets.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
