# FaithTracker Docker Compose
# Production deployment with Angie (host-level reverse proxy)
#
# Architecture:
#   - Angie runs at HOST level (handles SSL, rate limiting, security)
#   - All application services run in Docker containers
#   - Services exposed to localhost only (127.0.0.1)
#   - Data stored in ./data/ directory (bind mounts for easy migration)
#
# Setup:
#   1. Install Angie: sudo ./angie/install.sh
#   2. Setup SSL: sudo ./angie/setup-ssl.sh
#   3. Initialize secrets: make init-secrets
#   4. Start services: docker compose up -d
#
# Migration:
#   Copy entire project folder (including ./data/ and ./secrets/) to new server

services:
  # ===================
  # DragonflyDB Cache (Redis-compatible, 25x faster)
  # ===================
  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.37.0
    container_name: faithtracker-dragonfly
    restart: always
    # Use Unix socket for better performance within Docker network
    command: >
      --logtostderr
      --force_epoll
      --cache_mode=true
      --maxmemory=512mb
      --hz=100
      --tcp_keepalive=300
    volumes:
      - ./data/dragonfly:/data
    networks:
      - faithtracker-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 768M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "echo PING | nc -w1 localhost 6379 | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ===================
  # Meilisearch - Full-text Search Engine
  # ===================
  meilisearch:
    image: getmeili/meilisearch:v1.41
    container_name: faithtracker-meilisearch
    restart: always
    environment:
      - MEILI_ENV=production
      # Required: set MEILI_MASTER_KEY in .env to a high-entropy secret.
      # No default — Compose will fail with a clear error if missing,
      # which is preferable to running with a publicly-known key.
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:?MEILI_MASTER_KEY must be set in .env}
      - MEILI_NO_ANALYTICS=true
    volumes:
      - ./data/meilisearch:/meili_data
    networks:
      - faithtracker-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ===================
  # MongoDB Database
  # ===================
  mongo:
    image: mongo:8.0
    container_name: faithtracker-mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: faithtracker
    volumes:
      - ./data/mongo:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - faithtracker-network
    # Resource limits to prevent runaway memory/CPU usage
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ===================
  # Backend - FastAPI/Litestar
  # ===================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: faithtracker-backend
    restart: always
    ports:
      - "127.0.0.1:8001:8001"
    environment:
      - ENVIRONMENT=production
      # Gateway IP of the faithtracker-network bridge — peer IP the backend
      # sees when host-side Angie proxies through the published port. Without
      # this the brute-force lockout collapses every client to Angie's IP and
      # one attacker can lock out every legitimate user. Override via
      # TRUSTED_PROXIES in .env for non-default network setups.
      - TRUSTED_PROXIES=${TRUSTED_PROXIES:-172.31.0.1}
      - MONGO_URL=mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGO_ROOT_PASSWORD}@mongo:27017/faithtracker?authSource=admin
      - DB_NAME=faithtracker
      - JWT_SECRET_KEY=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - DRAGONFLY_URL=redis://dragonfly:6379/0
      - FRONTEND_URL=https://${DOMAIN}
      - ALLOWED_ORIGINS=https://${DOMAIN},https://api.${DOMAIN}
      - WHATSAPP_GATEWAY_URL=${WHATSAPP_GATEWAY_URL:-}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - ADMIN_PHONE=${ADMIN_PHONE:-}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - ALERT_EMAIL=${ALERT_EMAIL:-}
      - MEILI_URL=http://meilisearch:7700
      # MUST match the value supplied to the Meilisearch container above.
      # No default — Compose refuses to start without it (matching the
      # Meilisearch service block), which is preferable to silently
      # connecting with a publicly-known key.
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:?MEILI_MASTER_KEY must be set in .env}
      - SECRETS_DIR=/run/secrets
    secrets:
      - mongo_password
      - jwt_secret
      - encryption_key
    volumes:
      - ./data/uploads:/app/uploads
      - ./data/logs:/app/logs
    networks:
      - faithtracker-network
    depends_on:
      mongo:
        condition: service_healthy
      dragonfly:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    # Resource limits to prevent runaway memory/CPU usage
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ===================
  # Frontend - React (served directly by host-level Angie)
  # ===================
  # DISABLED: Frontend static files are served directly from
  # /srv/faithtracker/frontend/build by host-level Angie.
  # To rebuild: docker compose run --rm frontend-builder
  # ===================
  frontend-builder:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
      args:
        VITE_BACKEND_URL: https://api.${DOMAIN}
    container_name: faithtracker-frontend-builder
    volumes:
      - /srv/faithtracker/frontend/build:/output
    entrypoint: ["sh", "-c", "cp -r /app/build/* /output/ && echo 'Frontend build copied to /srv/faithtracker/frontend/build'"]
    profiles:
      - build

# ===================
# Networks
# ===================
networks:
  faithtracker-network:
    name: faithtracker-network
    driver: bridge

# ===================
# Docker Secrets (Production)
# ===================
secrets:
  mongo_password:
    file: ./secrets/mongo_password
  jwt_secret:
    file: ./secrets/jwt_secret
  encryption_key:
    file: ./secrets/encryption_key

# ===================
# Data Directories (Bind Mounts)
# ===================
# Data is stored in ./data/ directory for easy backup and migration:
#   - ./data/mongo       - MongoDB database files
#   - ./data/dragonfly   - DragonflyDB cache persistence
#   - ./data/meilisearch - Meilisearch search index data
#   - ./data/uploads     - User-uploaded files (member photos)
#   - ./secrets/         - Docker secrets (sensitive credentials)
#
# To migrate to a new server, simply copy the entire project folder
# including the ./data/ and ./secrets/ directories.
